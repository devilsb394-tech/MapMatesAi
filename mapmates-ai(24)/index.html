    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "MapMates Ai",
      "description": "A premier map-based location and intelligent chatbot companion designed single-handedly by Faizan Zeeshan from Lahore, Pakistan.",

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Anti-Inspect Element Security Measure
      document.addEventListener('contextmenu', function(e) {
        e.preventDefault();
      });
      document.onkeydown = function(e) {
        // Disable F12
        if (e.keyCode === 123) {
          return false;
        }
        // Disable Ctrl+Shift+I / Cmd+Option+I
        if (e.ctrlKey && e.shiftKey && e.keyCode === 'I'.charCodeAt(0)) {
          return false;
        }
        // Disable Ctrl+Shift+J / Cmd+Option+J
        if (e.ctrlKey && e.shiftKey && e.keyCode === 'J'.charCodeAt(0)) {
          return false;
        }
        // Disable Ctrl+Shift+C
        if (e.ctrlKey && e.shiftKey && e.keyCode === 'C'.charCodeAt(0)) {
          return false;
        }
        // Disable Ctrl+U (View Source)
        if (e.ctrlKey && e.keyCode === 'U'.charCodeAt(0)) {
          return false;
        }
      };
    </script>
  </body>
